<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
	</head>
	<body>
		<!-- Navigation -->
		<nav class="nav">
			<div class="container nav__container">
				<div class="nav__inner">
					<a class="nav__logo" href="/index.html">Михаил Божеслав</a>

					<!-- Desktop links + theme toggle -->
					<div class="nav__desktop">
						<div class="nav__links">
							<a href="/index.html" class="nav__link">Главная</a>
							<a href="/skills-page.html" class="nav__link">Умения</a>
							<a href="/portfolio-page.html" class="nav__link">Портфолио</a>
							<a href="/experience-page.html" class="nav__link">Опыт</a>
							<a href="/blog-page.html" class="nav__link">Блог</a>
							<a href="/contacts-page.html" class="nav__link">Контакты</a>
						</div>
						<button
							class="btn btn--icon theme-toggle"
							id="themeToggle"
							aria-label="Toggle theme"
						>
							<svg
								class="sprites badge__icon theme-toggle__icon theme-toggle__icon--sun"
								aria-hidden="true"
							>
								<use href="/icons/sprites.svg#sun"></use>
							</svg>
							<svg
								class="sprites badge__icon theme-toggle__icon theme-toggle__icon--moon"
								aria-hidden="true"
							>
								<use href="/icons/sprites.svg#moon"></use>
							</svg>
						</button>
					</div>

					<!-- Mobile: theme toggle + hamburger -->
					<div class="nav__mobile-controls">
						<button
							class="btn btn--icon theme-toggle"
							id="themeToggleMobile"
							aria-label="Toggle theme"
						>
							<svg
								class="sprites badge__icon theme-toggle__icon theme-toggle__icon--sun"
								aria-hidden="true"
							>
								<use href="/icons/sprites.svg#sun"></use>
							</svg>
							<svg
								class="sprites badge__icon theme-toggle__icon theme-toggle__icon--moon"
								aria-hidden="true"
							>
								<use href="/icons/sprites.svg#moon"></use>
							</svg>
						</button>
						<button
							class="btn btn--icon"
							id="mobileMenuBtn"
							aria-label="Toggle menu"
						>
							<svg width="24" height="24" aria-hidden="true">
								<use
									id="menuIcon"
									class="menu-icon"
									href="/icons/sprites.svg#burger-menu"
								></use>
								<use
									id="closeIcon"
									class="close-icon"
									href="/icons/sprites.svg#cross-menu"
								></use>
							</svg>
						</button>
					</div>
				</div>
			</div>

			<!-- Mobile dropdown menu -->
			<div class="nav__mobile-menu" id="mobileMenu" hidden>
				<div class="nav__mobile-links">
					<a href="/index.html" class="nav__link nav__link--mobile"
						>Главная</a
					>
					<a href="/skills-page.html" class="nav__link nav__link--mobile"
						>Умения</a
					>
					<a href="/portfolio-page.html" class="nav__link nav__link--mobile"
						>Портфолио</a
					>
					<a href="/experience-page.html" class="nav__link nav__link--mobile"
						>Опыт</a
					>
					<a href="/blog-page.html" class="nav__link nav__link--mobile"
						>Блог</a
					>
					<a href="/contacts-page.html" class="nav__link nav__link--mobile"
						>Контакты</a
					>
				</div>
			</div>
		</nav>
	</body>
</html>
